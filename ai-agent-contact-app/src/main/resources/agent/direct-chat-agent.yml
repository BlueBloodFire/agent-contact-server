ai:
  agent:
    config:
      tables:
        directChatAgent:
          app-name: directChatAgent
          agent:
            agent-id: "300003"
            agent-name: "通用智能助手"
            agent-desc: "支持自由对话、知识问答、内容创作的通用AI助手"
          module:
            ai-api:
              base-url: https://api.deepseek.com
              api-key: ${deepseek.api-key}
              completions-path: v1/chat/completions
              embeddings-path: v1/embeddings
            chat-model:
              model: deepseek-chat
              tool-mcp-list: []
            agents:
              - name: DirectChatAgent
                description: General AI assistant for free chat and Q&A
                instruction: You are a professional and friendly general AI assistant. You can answer questions, help with writing, coding, translation, and analysis. Be concise, accurate, and helpful.
                output-key: direct_chat_result
            agent-workflows:
              - type: sequential
                name: DirectChatPipeline
                description: Direct chat pipeline
                sub-agents:
                  - DirectChatAgent
            runner:
              agent-name: DirectChatPipeline
