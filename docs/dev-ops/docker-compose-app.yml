# docker-compose -f docker-compose-app.yml up -d
version: '3.8'
services:

  # ─── 后端 Spring Boot ───────────────────────────────────────────
  backend:
    image: system/ai-agent-contact:1.0
    container_name: ai-agent-contact
    restart: on-failure
    ports:
      - "8092:8092"
    environment:
      - TZ=PRC
      - SERVER_PORT=8092
    volumes:
      - ./log:/data/log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - my-network

  # ─── Web 前端 (端口 80) ─────────────────────────────────────────
  web:
    image: system/ai-agent-contact-web:1.0
    container_name: ai-agent-contact-web
    restart: on-failure
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - my-network

  # ─── App 前端 (端口 8080) ────────────────────────────────────────
  app:
    image: system/ai-agent-contact-app:1.0
    container_name: ai-agent-contact-app
    restart: on-failure
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - my-network

networks:
  my-network:
    driver: bridge
